name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
        env:
          DATABASE_PATH: ":memory:"
          OPENAI_API_BASE_URL: "http://localhost:1234/v1"
          OPENAI_API_KEY: "test"
          EMBEDDING_MODEL: "test-embedding"
          EMBEDDING_DIMENSIONS: "1024"
          AUTH_SECRET: "ci-secret-replace-in-production"

      - name: Build
        run: npm run build
        env:
          DATABASE_PATH: ":memory:"
          OPENAI_API_BASE_URL: "http://localhost:1234/v1"
          OPENAI_API_KEY: "test"
          EMBEDDING_MODEL: "test-embedding"
          EMBEDDING_DIMENSIONS: "1024"
          AUTH_SECRET: "ci-secret-replace-in-production"
